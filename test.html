<!DOCTYPE html>
<html>
<head>
  <title>Test Voice API</title>
</head>
<body>
  <button id="testBtn">Test POST</button>
  <pre id="output"></pre>
  <script>
    const btn = document.getElementById('testBtn');
    const output = document.getElementById('output');
    btn.addEventListener('click', async () => {
      try {
        const resp = await fetch('https://99-names-of-allah.abcofislam.com/api/voice', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: 'Hello test' })
        });
        output.textContent = `Status: ${resp.status}\n`;
        if (resp.ok) {
          const blob = await resp.blob();
          output.textContent += `Received audio (${blob.size} bytes) – success!`;
        } else {
          const text = await resp.text();
          output.textContent += `Error: ${text}`;
        }
      } catch (e) {
        output.textContent = `Fetch error: ${e.message}`;
      }
    });
  </script>
</body>
</html>
